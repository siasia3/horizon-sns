<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Horizon SNS</title>
    <script src="https://kit.fontawesome.com/45c159df80.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div id="loadingSpinner" class="d-flex justify-content-center align-items-center position-fixed top-0 left-0 w-100 h-100 bg-light bg-opacity-50" style="z-index: 1050;">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>
<div class="wrapper">
    <header>
        <div th:replace="~{fragments/header :: header}">
        </div>
    </header>

    <div class="myContainer">
        <aside class="sidebar-left">
            <div th:replace="~{fragments/sidebar-left :: sidebar-left}"></div>
        </aside>

        <main layout:fragment="content">
        </main>

        <aside class="sidebar-right">
            <div th:replace="~{fragments/sidebar-right :: sidebar-right}"></div>
        </aside>
    </div>

    <!--<footer>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </footer>-->
</div>

<div class="modal" id="writeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">게시물 만들기</h5>
            </div>
            <form id="postForm" enctype="multipart/form-data">
                <div class="modal-body modalForm">
                    <div>
                        <label for="postContent">게시글 내용</label>
                        <textarea id="postContent" class="form-control" rows="4" placeholder="내용을 입력하세요..."></textarea>
                    </div>

                    <!-- 이미지 또는 동영상 파일 업로드 -->
                    <div>
                        <label class="contentLabel" for="fileInput">이미지/동영상 업로드</label>
                        <input type="file" id="fileInput" accept="image/*, video/*" class="form-control" multiple/>
                    </div>

                    <!-- 파일 미리보기 캐러셀 -->
                    <div id="dynamicCarousel" class="carousel slide" data-bs-ride="carousel">
                        <label class="contentLabel">이미지/동영상 미리보기</label>
                        <div class="carousel-inner" id="carouselItems"></div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#dynamicCarousel" data-bs-slide="prev" id="prevButton" style="display: none;">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Previous</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#dynamicCarousel" data-bs-slide="next" id="nextButton" style="display: none;">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Next</span>
                        </button>
                    </div>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn-close" onclick="closeModal()"></button>
                <button type="button" id="postBtn" class="btn btn-primary">게시</button>
             </div>
        </div>
    </div>
</div>


<script src="/js/leftside.js"></script>
<script src="/js/token.js"></script>
<script src="/js/search.js"></script>
<script src="/js/currentMember.js"></script>
<script src="/js/friend.js"></script>
<script src="/js/post.js" defer></script>

<th:block layout:fragment="script"></th:block>
<script>
    window.addEventListener("load", async function (){
        if (!sessionStorage.getItem('userId')) {
            await getMemberInfo();
            renderHeaderMemberInfo();

            let friends = await getFriends();
            renderFriendList(friends);

        }else if(sessionStorage.getItem('userId')){
            renderHeaderMemberInfo();
            let friends = await getFriends();
            renderFriendList(friends);
        }

    });


    //검색 회원Preview 클릭시 회원페이지 이동
    document.getElementById('searchPreview').addEventListener('click',function (event) {
        let preview = event.target.closest('.preview');
        if (preview) {
            let nickname = preview.querySelector('.previewNickName').textContent;
            console.log(nickname);
            window.location.href = `${BASE_URL}/user/${nickname}`;
        }
    });

    //친구요청 페이지
    document.getElementById('friendPage').addEventListener('click',function (){
        window.location.href = `${BASE_URL}/friendRequest`;
    });

    //로그아웃 클릭
    document.getElementById('logout').addEventListener('click',function (){
        logout();
    });

    //검색내용을 지운 경우 UI 지우기
    document.getElementById('mySearch').addEventListener('input',function (){
        if (this.value.trim() === "") {
            deleteSearchUI()
        }
    });

    //검색을 하는 경우 UI 생성
    document.getElementById('mySearch').addEventListener("input", debounce((event) => {
        if (event.target.value.trim() !== '') {
            previewMember(event.target.value).then(result => {
                previewMemberUI(result);
            });

        }
    }, 300));

    //헤더 회원이름 클릭시 개인페이지 이동
    document.getElementById('memberName').addEventListener('click',function (){
        let memberName = this.children[0].textContent;
        let nickname = memberName.slice(0,-1);
        window.location.href = `${BASE_URL}/user/${nickname}`;
    });

    //헤더 왼쪽 로고 클릭시 메인페이지
    document.getElementById("header-left").addEventListener('click',function (){
       window.location.href = `${BASE_URL}/main`;
    });

</script>

</body>
</html>
